name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t healthcare-ai .

      - name: Run container (test)
        run: docker run -d -p 8501:8501 -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} healthcare-ai

      - name: Check running containers
        run: docker ps